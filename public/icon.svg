<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MediaHubAccess">
  <defs>
    <linearGradient id="mhBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="mhGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCF6BA"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#BF953F"/>
    </linearGradient>
    <linearGradient id="mhShield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5EDFF"/>
    </linearGradient>
    <filter id="mhGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background plate -->
  <rect width="64" height="64" rx="14" fill="url(#mhBg)"/>
  <!-- Subtle inner highlight -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <!-- Soft top sheen -->
  <path d="M14 4 H50 Q60 4 60 14 V22 Q40 14 4 22 V14 Q4 4 14 4 Z" fill="#FFFFFF" fill-opacity="0.06"/>

  <!-- Shield silhouette (white) -->
  <path d="M32 9 L50.5 15 V31 C50.5 41.5 42.8 50 32 54.5 C21.2 50 13.5 41.5 13.5 31 V15 Z"
        fill="url(#mhShield)"/>

  <!-- Play triangle inside shield (cuts through with bg color) -->
  <path d="M28 25 V40 L41 32.5 Z" fill="url(#mhBg)"/>

  <!-- Streaming signal arcs (above the play, subtle) -->
  <path d="M24.5 21 Q32 17 39.5 21" stroke="#1E40AF" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Gold license-verified badge (top-right) -->
  <circle cx="49" cy="14" r="7.5" fill="url(#mhGold)"/>
  <circle cx="49" cy="14" r="7.5" fill="none" stroke="#050505" stroke-opacity="0.35" stroke-width="1"/>
  <path d="M45.4 14 L48.1 16.7 L52.8 11.7" stroke="#050505" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
